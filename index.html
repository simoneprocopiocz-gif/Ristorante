<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Ristorante NOME DEL LOCALE</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">

<style>
body{
 margin:0;
 font-family:'Poppins',sans-serif;
 background:#f4f1ee;
 overflow-x:hidden;
}

/* HEADER */
header{
 background:#222;
 color:#fff;
 text-align:center;
 padding:60px 15px;
}
header h1{color:#f1c40f;margin:0}

/* NAV */
nav{
 background:#fff;
 padding:10px;
 text-align:center;
 position:sticky;
 top:0;
 z-index:50;
}
nav a{
 margin:0 8px;
 color:#e74c3c;
 text-decoration:none;
 font-weight:600;
 font-size:14px;
}

/* CONTENT */
.container{
 padding:15px;
}

.section{
 background:#fff;
 margin-bottom:15px;
 padding:15px;
 border-radius:12px;
}

.section h2{
 color:#e74c3c;
 font-size:18px;
 margin-bottom:10px;
}

/* MENU */
.menu-item{
 display:flex;
 justify-content:space-between;
 align-items:center;
 padding:12px;
 border-radius:10px;
 cursor:pointer;
 background:#fafafa;
 margin-bottom:8px;
}

.menu-item span{
 color:#e74c3c;
 font-weight:600;
}

/* BADGE */
.badge{
 position:fixed;
 top:10px;
 right:10px;
 background:#e74c3c;
 color:#fff;
 padding:8px 12px;
 border-radius:20px;
 z-index:200;
 cursor:pointer;
}

/* OVERLAY */
#overlay{
 position:fixed;
 inset:0;
 background:rgba(0,0,0,0.5);
 display:none;
 z-index:90;
}

/* CARRELLO */
#cartBox{
 position:fixed;
 top:0;
 left:0;
 width:100vw;
 height:100vh;
 background:#fff;
 padding:20px 15px;
 transform:translateX(100%);
 transition:transform 0.3s ease;
 z-index:100;
 display:flex;
 flex-direction:column;
 box-sizing:border-box;
 touch-action:pan-y;
}

#cartBox.active{
 transform:translateX(0);
}

/* LISTA */
#cart-items{
 flex:1;
 overflow:auto;
 list-style:none;
 padding:0;
}

/* ITEM */
.cart-item{
 display:flex;
 justify-content:space-between;
 align-items:center;
 gap:10px;
 margin-bottom:12px;
}

.cart-item span{
 flex:1;
 word-break:break-word;
}

/* CONTROLLI */
.qty-controls{
 display:flex;
 gap:5px;
}

.qty-btn{
 background:#e74c3c;
 color:#fff;
 border:none;
 width:26px;
 height:26px;
 border-radius:6px;
}

/* BUTTON */
button{
 padding:10px;
 border:none;
 border-radius:8px;
 margin-top:8px;
}

.clear{background:#ccc}
.confirm{background:#e74c3c;color:#fff}

footer{
 text-align:center;
 padding:15px;
 background:#222;
 color:#fff;
}
</style>
</head>

<body>

<div class="badge" id="cart-count" onclick="toggleCart()">0 🛒</div>
<div id="overlay" onclick="closeCart()"></div>

<header>
<h1>🍕 NOME DEL LOCALE</h1>
<p>Tradizione Italiana</p>
</header>

<nav>
<a href="#antipasti">Antipasti</a>
<a href="#pizze">Pizze</a>
<a href="#primi">Primi</a>
<a href="#bevande">Bevande</a>
</nav>

<div class="container">

<div class="section">
<h2>Antipasti</h2>
<div class="menu-item" onclick="addToCart('Bruschette',6)">Bruschette <span>€6</span></div>
<div class="menu-item" onclick="addToCart('Tagliere',12)">Tagliere <span>€12</span></div>
</div>

<div class="section">
<h2>Pizze</h2>
<div class="menu-item" onclick="addToCart('Margherita',7)">Margherita <span>€7</span></div>
<div class="menu-item" onclick="addToCart('Diavola',9)">Diavola <span>€9</span></div>
</div>

<div class="section">
<h2>Primi</h2>
<div class="menu-item" onclick="addToCart('Carbonara',10)">Carbonara <span>€10</span></div>
</div>

</div>

<!-- CARRELLO -->
<div id="cartBox">
<h3>🛒 Il tuo ordine</h3>
<ul id="cart-items"></ul>
<div id="total">Totale: €0</div>
<button class="clear" onclick="clearCart()">Svuota</button>
<button class="confirm" onclick="confirmOrder()">Conferma</button>
</div>

<footer>📍 Catanzaro</footer>

<script>
let cart = JSON.parse(localStorage.getItem('cart')) || [];

const cartBox = document.getElementById('cartBox');
const overlay = document.getElementById('overlay');

/* OPEN / CLOSE */
function openCart(){
 cartBox.classList.add('active');
 overlay.style.display='block';
 cartBox.style.transform="translateX(0)";
}

function closeCart(){
 cartBox.classList.remove('active');
 overlay.style.display='none';
 cartBox.style.transform="translateX(100%)";
}

function toggleCart(){
 if(cartBox.classList.contains('active')){
  closeCart();
 } else {
  openCart();
 }
}

/* CART */
function addToCart(name, price){
 const existing = cart.find(i=>i.name===name);
 if(existing){existing.qty++;}
 else{cart.push({name,price,qty:1});}
 saveCart();
 updateCart();
}

function updateCart(){
 const list = document.getElementById('cart-items');
 list.innerHTML='';
 let total=0,count=0;

 cart.forEach((item,i)=>{
  total+=item.price*item.qty;
  count+=item.qty;

  const li=document.createElement('li');
  li.className='cart-item';

  li.innerHTML=`
    <span>${item.name}</span>
    <div class="qty-controls">
      <button onclick="changeQty(${i},-1)">-</button>
      <span>${item.qty}</span>
      <button onclick="changeQty(${i},1)">+</button>
    </div>
  `;

  list.appendChild(li);
 });

 document.getElementById('total').innerText="Totale: €"+total;
 document.getElementById('cart-count').innerText=count+" 🛒";
}

function changeQty(i,d){
 cart[i].qty+=d;
 if(cart[i].qty<=0) cart.splice(i,1);
 saveCart();
 updateCart();
}

function saveCart(){
 localStorage.setItem('cart',JSON.stringify(cart));
}

function clearCart(){
 cart=[];
 saveCart();
 updateCart();
}

function confirmOrder(){
 if(cart.length===0){alert("Carrello vuoto");return;}
 alert("Ordine confermato!");
}

/* SWIPE */
let startX=0;
let currentX=0;
let dragging=false;

cartBox.addEventListener("touchstart",(e)=>{
 startX=e.touches[0].clientX;
 dragging=true;
});

cartBox.addEventListener("touchmove",(e)=>{
 if(!dragging) return;

 currentX=e.touches[0].clientX;
 let diff=currentX-startX;

 if(diff>0){
   cartBox.style.transform=`translateX(${diff}px)`;
 }
});

cartBox.addEventListener("touchend",()=>{
 dragging=false;

 let diff=currentX-startX;

 if(diff>120){
   closeCart();
 } else {
   cartBox.style.transform="translateX(0)";
 }
});

updateCart();
</script>

</body>
</html>
