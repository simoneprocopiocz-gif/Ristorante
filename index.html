<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>NOME DEL RISTORANTE</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600&display=swap" rel="stylesheet">

<style>
body{
 margin:0;
 font-family:Poppins;
 background:#f4f1ee;
 overflow-x:hidden;
}

/* HEADER */
header{
 background:#222;
 color:#fff;
 text-align:center;
 padding:50px 10px;
}
header h1{color:#f1c40f;margin:0}

/* NAV */
nav{
 background:#fff;
 padding:10px;
 text-align:center;
 position:sticky;
 top:0;
}
nav a{margin:0 8px;color:#e74c3c;text-decoration:none}

/* CONTENT */
.container{padding:15px}

.section{
 background:#fff;
 margin-bottom:15px;
 padding:15px;
 border-radius:12px;
}

.section h2{
 color:#e74c3c;
 margin-bottom:10px;
}

/* MENU */
.menu-item{
 display:flex;
 justify-content:space-between;
 padding:12px;
 background:#fafafa;
 border-radius:10px;
 margin-bottom:8px;
 cursor:pointer;
}

/* BADGE */
.badge{
 position:fixed;
 top:10px;
 right:10px;
 background:#e74c3c;
 color:#fff;
 padding:8px 12px;
 border-radius:20px;
 z-index:200;
 cursor:pointer;
}

/* OVERLAY */
#overlay{
 position:fixed;
 inset:0;
 background:rgba(0,0,0,0.5);
 display:none;
}

/* CARRELLO */
#cartBox{
 position:fixed;
 top:0;
 left:0;
 width:100vw;
 height:100vh;
 background:#fff;
 transform:translateX(100%);
 transition:0.3s;
 display:flex;
 flex-direction:column;
 box-sizing:border-box;
 padding:15px;
}

#cartBox.active{
 transform:translateX(0);
}

/* LISTA */
#cart-items{
 flex:1;
 overflow:auto;
 margin-bottom:10px;
 list-style:none;
 padding:0;
}

/* ITEM */
.cart-item{
 display:flex;
 justify-content:space-between;
 align-items:center;
 margin-bottom:10px;
}

/* CONTROLLI */
.qty-controls button{
 width:25px;
 height:25px;
 background:#e74c3c;
 color:#fff;
 border:none;
}

/* FOOTER */
.cart-footer{
 position:sticky;
 bottom:0;
 background:#fff;
 padding-top:10px;
}

/* BUTTON */
button{
 padding:10px;
 border:none;
 border-radius:8px;
 margin-top:8px;
}

.clear{background:#ccc}
.confirm{
 background:#e74c3c;
 color:#fff;
 width:100%;
 font-size:16px;
}
</style>
</head>

<body>

<div class="badge" onclick="toggleCart()" id="cart-count">0 🛒</div>
<div id="overlay" onclick="closeCart()"></div>

<header>
<h1>🍕 NOME DEL RISTORANTE</h1>
</header>

<nav>
<a href="#antipasti">Antipasti</a>
<a href="#pizze">Pizze</a>
<a href="#primi">Primi</a>
<a href="#bevande">Bevande</a>
</nav>

<div class="container">

<div class="section" id="antipasti">
<h2>Antipasti</h2>
<div class="menu-item" onclick="addToCart('Bruschette',6)">Bruschette €6</div>
<div class="menu-item" onclick="addToCart('Tagliere',12)">Tagliere €12</div>
</div>

<div class="section" id="pizze">
<h2>Pizze</h2>
<div class="menu-item" onclick="addToCart('Margherita',7)">Margherita €7</div>
<div class="menu-item" onclick="addToCart('Diavola',9)">Diavola €9</div>
<div class="menu-item" onclick="addToCart('Bufalina',11)">Bufalina €11</div>
</div>

<div class="section" id="primi">
<h2>Primi</h2>
<div class="menu-item" onclick="addToCart('Carbonara',10)">Carbonara €10</div>
<div class="menu-item" onclick="addToCart('Lasagna',11)">Lasagna €11</div>
</div>

<div class="section" id="bevande">
<h2>Bevande</h2>
<div class="menu-item" onclick="addToCart('Acqua',2)">Acqua €2</div>
<div class="menu-item" onclick="addToCart('Birra',5)">Birra €5</div>
</div>

</div>

<!-- CARRELLO -->
<div id="cartBox">
<h3>🛒 Ordine</h3>

<ul id="cart-items"></ul>

<div class="cart-footer">
  <div id="total">Totale: €0</div>
  <button class="clear" onclick="clearCart()">Svuota</button>
  <button class="confirm" onclick="confirmOrder()">Conferma</button>
</div>

</div>

<script>
let cart=[];

const cartBox=document.getElementById("cartBox");
const overlay=document.getElementById("overlay");

/* TOGGLE */
function toggleCart(){
 cartBox.classList.toggle("active");
 overlay.style.display=cartBox.classList.contains("active")?"block":"none";
}

function closeCart(){
 cartBox.classList.remove("active");
 overlay.style.display="none";
}

/* CART */
function addToCart(name,price){
 let item=cart.find(i=>i.name===name);
 if(item){item.qty++;}
 else{cart.push({name,price,qty:1});}
 updateCart();
}

function updateCart(){
 let list=document.getElementById("cart-items");
 list.innerHTML="";
 let total=0,count=0;

 cart.forEach((item,i)=>{
  total+=item.price*item.qty;
  count+=item.qty;

  let li=document.createElement("li");
  li.className="cart-item";
  li.innerHTML=`
   ${item.name} x${item.qty}
   <div class="qty-controls">
    <button onclick="changeQty(${i},-1)">-</button>
    <button onclick="changeQty(${i},1)">+</button>
   </div>
  `;
  list.appendChild(li);
 });

 document.getElementById("total").innerText="Totale: €"+total;
 document.getElementById("cart-count").innerText=count+" 🛒";
}

function changeQty(i,d){
 cart[i].qty+=d;
 if(cart[i].qty<=0) cart.splice(i,1);
 updateCart();
}

function clearCart(){
 cart=[];
 updateCart();
}

function confirmOrder(){
 if(cart.length===0){alert("Carrello vuoto");return;}
 alert("Ordine confermato!");
}

/* SWIPE SEMPLICE */
let startX=0;

cartBox.addEventListener("touchstart",(e)=>{
 startX=e.touches[0].clientX;
});

cartBox.addEventListener("touchend",(e)=>{
 let endX=e.changedTouches[0].clientX;
 if(endX-startX>80){
   closeCart();
 }
});
</script>

</body>
</html>
